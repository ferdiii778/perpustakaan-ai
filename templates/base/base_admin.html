<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}{% endblock %}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- CSS Utama Dashboard -->
<link rel="stylesheet"
href="{{ url_for('static', filename='css/dashboard_admin.css') }}">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- CSS Tambahan dari halaman lain -->
{% block extra_css %}
{% endblock %}

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <img
            src="https://ui-avatars.com/api/?name=AL+I&background=1E5FBF&color=fff&bold=true"
            alt="Logo">

            <div>
                <h4>Perpustakaan</h4>
                <span>SMA Al Irsyad</span>
            </div>

        </div>

        <nav>

            <ul>

                <li>
                    <a href="{{ url_for('dashboard') }}">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('kelola_buku') }}">
                        <i class="fa-solid fa-book"></i>
                        Kelola Buku
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        Rekomendasi AI
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('riwayat') }}">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        Riwayat Peminjaman
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="fa-solid fa-heart"></i>
                        Favorit
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('pengaturan') }}">
                        <i class="fa-solid fa-gear"></i>
                        Pengaturan
                    </a>
                </li>

            </ul>

        </nav>

        <div class="sidebar-footer">

            <a href="{{ url_for('logout') }}">
                <i class="fa-solid fa-right-from-bracket"></i>
                Keluar
            </a>

        </div>

    </aside>

    <!-- CONTENT -->
    {% block content %}
    {% endblock %}

</div>

</body>
</html>
